name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage
      - run: dart run tool/check_feature_coverage.dart coverage/lcov.info 100
      - run: flutter build web --release --base-href /prototype/
      - run: dart run tool/check_web_size.dart build/web 2542046 42390694 16220
      - run: touch build/web/.nojekyll
      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Smoke deployed prototype
        run: |
          set -euo pipefail
          curl --fail --location "${{ steps.deployment.outputs.page_url }}"
          curl --fail --location "${{ steps.deployment.outputs.page_url }}main.dart.js"
